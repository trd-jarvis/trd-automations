name: outbound-email-automation
description: Send polished HTML outbound emails through gog from generated lead analysis.
entry:
  command: npm run outreach:email-send -- --client {{clientId}} --limit {{limit}}
defaults:
  clientId: trd-demo-client
  limit: 25
outputs:
  - data/reports/*-outbound-email.html
  - data/exports/*-email-send.json
  - queued-share-job
